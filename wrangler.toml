name = "seo-blog-generator"
type = "service"
account_id = "" # Replace with your Cloudflare account ID
workers_dev = true
routes = [{ pattern = "example.com/*", zone_name = "example.com" }]
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Workers AI Bindings ──────────────────────────────────────────────────────
[[ai]]
binding = "AI"

# ── D1 Database (for caching generated blogs) ────────────────────────────────
# Uncomment to enable caching
# [[d1_databases]]
# binding = "DB"
# database_name = "seo-blog-cache"
# database_id = "" # Replace with your D1 database ID

# ── KV Namespace (for storing trending keywords cache) ────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "" # Replace with your KV namespace ID
preview_id = "" # Replace with your preview KV namespace ID

# ── Environment Variables ────────────────────────────────────────────────────
[env.production]
name = "seo-blog-generator"
routes = [{ pattern = "yourdomain.com/*", zone_name = "yourdomain.com" }]

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "" # Replace with production KV namespace ID

[env.development]
name = "seo-blog-generator-dev"
vars = { ENVIRONMENT = "development" }

[[env.development.kv_namespaces]]
binding = "CACHE"
id = "" # Replace with development KV namespace ID

# ── Build Configuration ──────────────────────────────────────────────────────
[build]
command = "npm run build"
cwd = "./"
main = "src/index.ts"

[build.upload]
format = "modules"
dir = "dist"
main = "./index.mjs"

# ── Triggers (optional - for scheduled tasks) ──────────────────────────────────
# [[triggers.crons]]
# cron = "0 0 * * *" # Daily at midnight
